<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 March Special</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { position: absolute; top: 0; left: 0; }
        
        #overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff007f; font-size: 4rem; text-align: center;
            text-shadow: 0 0 20px #ff007f; z-index: 10; pointer-events: none;
        }

        .final-text {
            position: absolute; bottom: 20%; width: 100%;
            color: white; text-align: center; font-size: 1.5rem;
            opacity: 0; z-index: 11;
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div id="overlay"></div>
    <div class="final-text" id="finalText">Самой лучшей в мире! <br> С праздником 8 марта!</div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const finalText = document.getElementById('finalText');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "010101018MARCH";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff007f";
            ctx.font = fontSize + "px arial";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        const matrixInterval = setInterval(drawMatrix, 33);

        // Таймер сообщений
        const messages = ["3", "2", "1", "HAPPY", "8 MARCH"];
        let msgIndex = 0;

        function runIntro() {
            if (msgIndex < messages.length) {
                overlay.innerText = messages[msgIndex];
                gsap.fromTo(overlay, {scale: 0.5, opacity: 0}, {scale: 1.2, opacity: 1, duration: 0.8, yoyo: true, repeat: 1});
                msgIndex++;
                setTimeout(runIntro, 1600);
            } else {
                showHeart();
            }
        }

        function showHeart() {
            clearInterval(matrixInterval);
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            overlay.style.display = 'none';

            // Рисуем пульсирующее сердце кодом
            function drawHeart() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                const time = Date.now() * 0.005;
                const size = 15 + Math.sin(time) * 2; // Эффект пульсации
                
                ctx.save();
                ctx.translate(canvas.width/2, canvas.height/2 - 50);
                ctx.beginPath();
                for (let t = 0; t <= Math.PI * 2; t += 0.01) {
                    const x = 16 * Math.pow(Math.sin(t), 3);
                    const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    ctx.lineTo(x * size, y * size);
                }
                ctx.fillStyle = "#ff007f";
                ctx.shadowBlur = 30;
                ctx.shadowColor = "#ff007f";
                ctx.fill();
                ctx.restore();
                
                requestAnimationFrame(drawHeart);
            }
            
            drawHeart();
            gsap.to(finalText, {opacity: 1, duration: 2, delay: 0.5});
        }

        runIntro();
    </script>
</body>
</html>
